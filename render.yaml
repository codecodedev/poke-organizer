services:
  - type: web
    name: poke-organizer-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 3333
      - key: DATABASE_URL
        fromDatabase:
          name: poke-organizer-db
          property: connectionString
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: POKEMON_TCG_API_KEY
        sync: false
      - key: ENABLE_BRAZILIAN_PRICE_PROVIDERS
        value: "false"

databases:
  - name: poke-organizer-db
    plan: starter
    databaseName: poke_organizer
    user: poke


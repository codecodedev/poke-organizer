services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poke}
      POSTGRES_DB: ${POSTGRES_DB:-poke_organizer}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poke} -d ${POSTGRES_DB:-poke_organizer}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      API_PORT: 3333
      API_HOST: 0.0.0.0
      WEB_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://${POSTGRES_USER:-poke}:${POSTGRES_PASSWORD:-poke}@postgres:5432/${POSTGRES_DB:-poke_organizer}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      POKEMON_TCG_API_KEY: ${POKEMON_TCG_API_KEY:-}
      ENABLE_BRAZILIAN_PRICE_PROVIDERS: ${ENABLE_BRAZILIAN_PRICE_PROVIDERS:-false}
    ports:
      - "3333:3333"
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
      - api-app-node-modules:/workspace/apps/api/node_modules
      - shared-node-modules:/workspace/packages/shared/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy

  pricing-service:
    profiles:
      - docker-pricing
    build:
      context: .
      dockerfile: apps/pricing-service/Dockerfile
    environment:
      NODE_ENV: development
      PRICING_SERVICE_PORT: 3344
      PRICING_SERVICE_HOST: 0.0.0.0
      PRICING_DATABASE_URL: postgresql://${POSTGRES_USER:-poke}:${POSTGRES_PASSWORD:-poke}@postgres:5432/${POSTGRES_DB:-poke_organizer}?schema=pricing
      LIGA_SYNC_HEADLESS: "true"
      LIGA_SYNC_EXECUTABLE_PATH: /usr/bin/chromium-browser
      LIGA_SYNC_USER_DATA_DIR: /tmp/liga-browser-profile
    ports:
      - "3344:3344"
    volumes:
      - .:/workspace
      - pricing-node-modules:/workspace/node_modules
      - pricing-app-node-modules:/workspace/apps/pricing-service/node_modules
      - shared-node-modules:/workspace/packages/shared/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:3333
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
      - web-app-node-modules:/workspace/apps/web/node_modules
      - shared-node-modules:/workspace/packages/shared/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - api

volumes:
  postgres-data:
  pnpm-store:
  api-node-modules:
  api-app-node-modules:
  pricing-node-modules:
  pricing-app-node-modules:
  web-node-modules:
  web-app-node-modules:
  shared-node-modules:
